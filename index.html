<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>느린아이 비교하기</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --warm-700:#4A4035; --warm-800:#2E261D;
  --warm-400:#B8AD9E; --warm-500:#8C8070; --warm-600:#6B5F50;
  --border:#E8E2DA; --border-light:#F0ECE6;
  --blue:#6BADE8; --orange:#F0A050; --green:#5BC886; --red:#F07070;
  --bg:#F5F1EB;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);min-height:100dvh;display:flex;justify-content:center;align-items:flex-start;user-select:none;-webkit-tap-highlight-color:transparent;color:var(--warm-700);}
.hidden{display:none!important;}
.app{width:100%;max-width:480px;min-height:100dvh;background:#fff;padding:24px 20px;padding-top:max(24px,env(safe-area-inset-top));padding-bottom:max(24px,env(safe-area-inset-bottom));display:flex;flex-direction:column;align-items:center;}
@media(min-width:768px){body{align-items:center;padding:32px;}.app{max-width:560px;min-height:auto;border-radius:32px;box-shadow:0 8px 48px rgba(0,0,0,.07),0 1px 4px rgba(0,0,0,.04);padding:44px 40px;}}

/* ── Login ── */
.login-view{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;min-height:100dvh;padding:40px 20px;width:100%;}
.login-logo-area{text-align:center;margin-bottom:48px;}
.login-logo-area h1{font-size:1.875rem;font-weight:900;letter-spacing:-.025em;margin-top:8px;}
.login-subtitle{color:var(--warm-400);font-size:.9375rem;margin-top:4px;}
@keyframes floatBubble{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.login-trial{position:relative;background:#FFF8F0;border:1.5px solid #EDD080;border-radius:14px;padding:9px 16px;font-size:.78rem;color:#7B6545;font-weight:600;text-align:center;margin-bottom:24px;line-height:1.4;box-shadow:0 4px 14px rgba(220,160,50,.18);animation:floatBubble 2.8s ease-in-out infinite;align-self:center;}
.login-trial::before{content:'';position:absolute;bottom:-9px;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top:8px solid #EDD080;border-bottom:0;}
.login-trial::after{content:'';position:absolute;bottom:-7px;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top:7px solid #FFF8F0;border-bottom:0;z-index:1;}
.login-buttons{width:100%;max-width:320px;display:flex;flex-direction:column;gap:12px;}
.login-btn{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px 20px;border-radius:12px;border:none;font-size:.9375rem;font-weight:600;font-family:inherit;cursor:pointer;transition:transform .1s;}
.login-btn:active{transform:scale(.97);}
.login-btn svg{flex-shrink:0;}
.login-btn.kakao{background:#FEE500;color:#191919;}
.login-btn.naver{background:#03C75A;color:#fff;}
.login-btn.google{background:#fff;color:#444;border:1.5px solid #DADCE0;}
.login-btn.facebook{background:#1877F2;color:#fff;}

/* ── Start View ── */
#start-view{width:100%;display:flex;flex-direction:column;align-items:center;}
.brand{display:flex;flex-direction:column;align-items:center;margin-bottom:20px;position:relative;width:100%;}
.brand h1{font-size:1.5rem;font-weight:900;letter-spacing:-.025em;margin-top:8px;}
.share-btn{position:absolute;top:0;right:0;background:#fff;border:2px solid var(--border);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--warm-500);}

/* Mode Cards */
.mode-grid{width:100%;display:flex;flex-direction:column;gap:10px;margin-bottom:16px;}
.mode-card{background:#fff;border:2px solid var(--border);border-radius:20px;padding:14px 16px 12px;width:100%;}
.mode-card-top{display:flex;align-items:center;gap:12px;margin-bottom:10px;}
.mode-preview-wrap{width:76px;height:52px;flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.mode-info{flex:1;text-align:left;}
.mode-title{font-size:1rem;font-weight:700;color:var(--warm-700);margin-bottom:2px;}
.mode-desc{font-size:.72rem;color:var(--warm-400);}
.mode-btns{display:flex;gap:8px;}
.mode-btn{flex:1;padding:10px 0;border:2px solid var(--border);border-radius:10px;background:#fff;font-family:inherit;font-size:.85rem;font-weight:700;color:var(--warm-600);cursor:pointer;transition:all .12s;text-align:center;}
.mode-btn:hover,.mode-btn:active{background:#EEF6FD;border-color:var(--blue);color:var(--blue);}

/* ── Settings ── */
.settings-section{width:100%;border-top:1.5px solid var(--border-light);padding-top:16px;margin-top:4px;}
.setting-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;}
.setting-label{font-size:.875rem;font-weight:600;color:var(--warm-700);}
.setting-desc{font-size:.75rem;color:var(--warm-400);margin-top:2px;}
.toggle-track{width:48px;height:28px;border-radius:99px;position:relative;background:#E0DAD0;border:none;cursor:pointer;flex-shrink:0;transition:background .2s;}
.toggle-track.on{background:#5BC886;}
.toggle-knob{width:22px;height:22px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;box-shadow:0 1px 4px rgba(0,0,0,.12);transition:transform .2s;}
.toggle-track.on .toggle-knob{transform:translateX(20px);}
.impulse-mode-options{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px;}
.impulse-mode-btn{display:flex;flex-direction:column;align-items:center;padding:10px 8px;border-radius:14px;border:2px solid var(--border);background:#fff;cursor:pointer;transition:all .15s;font-family:inherit;}
.impulse-mode-btn.selected{border-color:#C4AA82;background:#FAF5EE;}
.impulse-mode-icon{font-size:1.2rem;margin-bottom:2px;}
.impulse-mode-label{font-size:.8rem;font-weight:700;color:var(--warm-700);}
.impulse-mode-desc{font-size:.65rem;color:var(--warm-400);margin-top:1px;}
.imp-sec-row{display:flex;flex-wrap:wrap;gap:4px;justify-content:center;}
.imp-sec{flex:0 0 calc((100% - 16px)/5);padding:8px 0;font-size:.7rem;font-weight:600;border-radius:10px;border:2px solid var(--border);background:#fff;color:#8C8070;cursor:pointer;font-family:inherit;transition:all .15s;text-align:center;}
.imp-sec.active{border-color:#C4AA82;background:#FAF5EE;color:#7B6545;}
#impulse-details{display:none;}
.logout-btn{background:none;border:1.5px solid var(--border);border-radius:8px;padding:6px 14px;font-size:.75rem;font-weight:600;color:var(--warm-400);cursor:pointer;font-family:inherit;margin-top:20px;}
.logout-btn:hover{background:var(--bg);}

/* ── Play View ── */
#play-view{width:100%;display:flex;flex-direction:column;align-items:center;}
.play-header{display:flex;align-items:center;gap:12px;width:100%;margin-bottom:14px;}
.btn-home{width:36px;height:36px;border-radius:10px;border:2px solid var(--border);background:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--warm-500);flex-shrink:0;padding:0;}
.play-middle{flex:1;display:flex;flex-direction:column;gap:4px;}
.play-progress-label{font-size:.8rem;font-weight:600;color:var(--warm-500);}
.play-progress-bar{width:100%;height:6px;background:var(--border-light);border-radius:3px;overflow:hidden;}
.play-progress-fill{height:100%;border-radius:3px;background:var(--blue);transition:width .3s;}
.play-score{font-size:.85rem;font-weight:700;color:var(--green);flex-shrink:0;}
.game-container{background:#fff;border:2px solid var(--border);border-radius:20px;padding:20px 10px 16px;width:100%;display:flex;flex-direction:column;align-items:center;}
.question-prompt{font-size:1.3rem;font-weight:900;color:var(--warm-700);text-align:center;margin-bottom:20px;line-height:1.3;}

/* Item cards */
.compare-row{display:flex;gap:10px;justify-content:center;width:100%;margin-bottom:18px;}
.item-card{flex:1;border:2px solid var(--border);border-radius:16px;display:flex;flex-direction:column;align-items:center;padding:12px 6px 10px;background:#FDFCFA;min-width:0;cursor:pointer;transition:border-color .15s,background .15s,transform .1s;}
.item-card:hover{border-color:var(--blue);background:#EEF6FD;}
.item-card:active{transform:scale(.96);}
.item-card.card-correct{border-color:#5BC886!important;background:#D4F5E0!important;}
.item-card.card-wrong{border-color:#F07070!important;background:#FDE8E8!important;opacity:.6;}
.item-card.card-locked{pointer-events:none;}
.item-label{display:none;}
.item-visual{display:flex;align-items:center;justify-content:center;width:100%;min-height:110px;}
.item-visual svg{width:100%;height:auto;display:block;}


.feedback{font-size:1rem;font-weight:700;text-align:center;padding:10px 0;min-height:42px;}
.feedback.correct{color:#5BC886;}
.feedback.wrong{color:#F07070;}

.btn-next-q{display:block;width:100%;max-width:360px;margin:8px auto 0;padding:14px 0;border-radius:16px;border:none;background:#4A4035;color:#fff;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;box-shadow:0 2px 8px rgba(74,64,53,.15);transition:background .15s,transform .1s;}
.btn-next-q:active{transform:scale(.98);background:#2E261D;}

.reveal-btn{display:block;width:100%;max-width:320px;margin:8px auto;padding:14px 0;border-radius:14px;border:2px solid #C4AA82;background:#FAF5EE;color:#7B6545;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;text-align:center;}
.reveal-btn:active{background:#F0E6D6;transform:scale(.98);}
.delay-countdown{text-align:center;font-size:1.5rem;font-weight:900;color:#C4AA82;padding:14px 0;animation:pulse-count 1s ease infinite;}

/* Result View */
#result-view{width:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;text-align:center;padding:40px 0;}
.big-score{font-size:4rem;font-weight:900;color:#5BC886;line-height:1;}
.result-label{font-size:1.1rem;font-weight:600;color:#8C8070;margin-top:8px;}
.result-detail{font-size:.9rem;color:#B8AD9E;margin-top:4px;}
.retry-btn{margin-top:32px;padding:14px 48px;border-radius:16px;border:2.5px solid var(--border);background:#fff;font-family:inherit;font-size:1rem;font-weight:700;color:var(--warm-700);cursor:pointer;}
.retry-btn:active{transform:scale(.95);}

/* Splash */
.splash-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:#fff;display:flex;flex-direction:column;justify-content:center;align-items:center;z-index:9999;transition:opacity .5s ease-out;}
.splash-overlay.fade-out{opacity:0;pointer-events:none;}
.splash-logo{animation:splashFloat 2.4s ease-in-out infinite;margin-bottom:24px;}
.splash-title{font-size:2rem;font-weight:900;letter-spacing:-.025em;margin-bottom:8px;}
.splash-subtitle{color:#B8B0A8;font-size:.9375rem;font-weight:500;}
@keyframes splashFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes popIn{0%{transform:scale(.8);opacity:.5}45%{transform:scale(1.15)}65%{transform:scale(.92)}80%{transform:scale(1.05)}100%{transform:scale(1)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
@keyframes pulse-count{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.15);opacity:.7}}
</style>
</head>

<script>
/* ══ 모드 정의 ══ */
const MODES = {
  big:   { q2max:'어느 것이 더 크나요?',   q2min:'어느 것이 더 작나요?',   q3max:'제일 큰 것은?',   q3min:'제일 작은 것은?'   },
  long:  { q2max:'어느 것이 더 길까요?',   q2min:'어느 것이 더 짧을까요?', q3max:'제일 긴 것은?',   q3min:'제일 짧은 것은?'   },
  wide:  { q2max:'어느 것이 더 넓나요?',   q2min:'어느 것이 더 좁나요?',   q3max:'제일 넓은 것은?', q3min:'제일 좁은 것은?'   },
  thick: { q2max:'어느 것이 더 굵나요?',   q2min:'어느 것이 더 얇나요?',   q3max:'제일 굵은 것은?', q3min:'제일 얇은 것은?'   },
  deep:  { q2max:'어느 것이 더 깊나요?',   q2min:'어느 것이 더 얕나요?',   q3max:'제일 깊은 것은?', q3min:'제일 얕은 것은?'   },
  many:  { q2max:'어느 쪽이 더 많나요?',   q2min:'어느 쪽이 더 적나요?',   q3max:'제일 많은 것은?', q3min:'제일 적은 것은?'   }
};

/* ══ SVG 그리기 ══ */
const MANY_SHAPES = ['circle','square','triangle','star','heart'];
const COLOR_PALETTE = ['#6BADE8','#F0A050','#5BC886','#C080D0','#E88070','#60B8D8','#D4A850','#8FB8E8'];
const SHAPE_MODES = ['big','many']; // 모양 변화가 있는 모드
function shapeAt(shape, cx, cy, r, color) {
  switch(shape) {
    case 'circle': return `<circle cx="${cx}" cy="${cy}" r="${r}" fill="${color}" opacity=".85"/>`;
    case 'square': { const s=r*1.75; return `<rect x="${cx-s/2}" y="${cy-s/2}" width="${s}" height="${s}" rx="2" fill="${color}" opacity=".85"/>`; }
    case 'triangle': { const h=r*1.9; return `<polygon points="${cx},${cy-h*.6} ${cx-h*.55},${cy+h*.4} ${cx+h*.55},${cy+h*.4}" fill="${color}" opacity=".85"/>`; }
    case 'star': {
      let pts=''; for(let i=0;i<10;i++){const a=(i*36-90)*Math.PI/180,rad=i%2===0?r:r*.4; pts+=`${cx+Math.cos(a)*rad},${cy+Math.sin(a)*rad} `;}
      return `<polygon points="${pts.trim()}" fill="${color}" opacity=".85"/>`;
    }
    case 'heart': { const s=r*1.1; return `<path d="M${cx},${cy+s*.45} C${cx-s*1.35},${cy-s*.25} ${cx-s*1.35},${cy-s*1.15} ${cx},${cy-s*.35} C${cx+s*1.35},${cy-s*1.15} ${cx+s*1.35},${cy-s*.25} ${cx},${cy+s*.45}Z" fill="${color}" opacity=".85"/>`; }
  }
}

// level: 0=small, 1=medium, 2=large
function drawItem(modeId, level, shape, color, lineStyle) {
  const col = color || '#6BADE8';
  switch(modeId) {
    case 'big': {
      const r = [12, 22, 34][level];
      return `<svg viewBox="0 0 80 80" width="72" height="72">${shapeAt(shape||'circle', 40, 40, r, col)}</svg>`;
    }
    case 'long': {
      const w = [14, 40, 66][level];
      const x0 = (80 - w) / 2;
      const x1 = x0 + w;
      const cy = 40;
      const style = lineStyle || 'straight';
      if (style === 'straight') {
        return `<svg viewBox="0 0 80 80" width="80" height="72"><rect x="${x0}" y="${cy - 6}" width="${w}" height="12" rx="6" fill="${col}"/></svg>`;
      } else if (style === 'zigzag') {
        const amp = 9;
        const nSegs = Math.max(2, Math.round(w / 12));
        const segW = w / nSegs;
        let pts = `${x0},${cy}`;
        for (let i = 1; i <= nSegs; i++) {
          const x = x0 + i * segW;
          const y = cy + (i % 2 === 1 ? -amp : amp);
          pts += ` ${x},${y}`;
        }
        return `<svg viewBox="0 0 80 80" width="80" height="72"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
      } else {
        // wavy
        const amp = 14;
        const nCycles = Math.max(1, Math.round(w / 18));
        const halfW = w / (nCycles * 2);
        let d = `M${x0},${cy}`;
        for (let i = 0; i < nCycles * 2; i++) {
          const xStart = x0 + i * halfW;
          const xEnd = xStart + halfW;
          const xMid = (xStart + xEnd) / 2;
          const yCtrl = cy + (i % 2 === 0 ? -amp : amp);
          d += ` Q${xMid},${yCtrl} ${xEnd},${cy}`;
        }
        return `<svg viewBox="0 0 80 80" width="80" height="72"><path d="${d}" fill="none" stroke="${col}" stroke-width="5" stroke-linecap="round"/></svg>`;
      }
    }
    case 'wide': {
      const w = [16, 42, 68][level];
      const h = 26;
      const x = (80 - w) / 2, y = (80 - h) / 2;
      return `<svg viewBox="0 0 80 80" width="80" height="64"><rect x="${x}" y="${y}" width="${w}" height="${h}" rx="4" fill="${col}" opacity=".85"/></svg>`;
    }
    case 'thick': {
      const sw = [4, 11, 22][level];
      return `<svg viewBox="0 0 80 80" width="64" height="72"><line x1="40" y1="8" x2="40" y2="72" stroke="${col}" stroke-width="${sw}" stroke-linecap="round"/></svg>`;
    }
    case 'deep': {
      const pct = [0.18, 0.55, 0.90][level];
      const ch = 56, cTop = 8;
      const fh = Math.round(ch * pct);
      const fy = cTop + ch - fh;
      return `<svg viewBox="0 0 80 80" width="68" height="72">
        <rect x="20" y="${cTop}" width="40" height="${ch}" rx="3" fill="none" stroke="#8C7E6A" stroke-width="2.5"/>
        <rect x="21" y="${fy}" width="38" height="${fh}" fill="${col}" opacity=".55"/>
        <rect x="20" y="${cTop}" width="40" height="${ch}" rx="3" fill="none" stroke="#8C7E6A" stroke-width="2.5"/>
      </svg>`;
    }
    case 'many': {
      const count = [3, 6, 9][level];
      const cols = 3, r = 7, gap = 20;
      const rows = Math.ceil(count / cols);
      const gw = (Math.min(count, cols) - 1) * gap;
      const gh = (rows - 1) * gap;
      const sx = (80 - gw) / 2, sy = (80 - gh) / 2;
      let items = '';
      for (let i = 0; i < count; i++) {
        const cx = sx + (i % cols) * gap;
        const cy = sy + Math.floor(i / cols) * gap;
        items += shapeAt(shape||'circle', cx, cy, r, col);
      }
      return `<svg viewBox="0 0 80 80" width="72" height="72">${items}</svg>`;
    }
  }
}

/* ══ 문제 생성 ══ */
const PAIRS_2WAY = [[0,2],[0,1],[1,2]];

function generateQuestion(modeId, type) {
  const n = type === '2way' ? 2 : 3;
  let levels;
  if (n === 2) {
    levels = [...PAIRS_2WAY[Math.floor(Math.random() * PAIRS_2WAY.length)]];
  } else {
    levels = [0, 1, 2];
  }
  // Shuffle
  for (let i = levels.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [levels[i], levels[j]] = [levels[j], levels[i]];
  }
  const labels = ['A','B','C'].slice(0, n);
  const items = labels.map((label, i) => ({ label, level: levels[i] }));
  const direction = Math.random() < 0.5 ? 'max' : 'min';
  const targetLevel = direction === 'max' ? Math.max(...levels) : Math.min(...levels);
  const correct = items.find(it => it.level === targetLevel).label;
  const m = MODES[modeId];
  const qkey = type === '2way' ? (direction === 'max' ? 'q2max' : 'q2min') : (direction === 'max' ? 'q3max' : 'q3min');
  const shape = SHAPE_MODES.includes(modeId) ? MANY_SHAPES[Math.floor(Math.random() * MANY_SHAPES.length)] : null;
  const color = COLOR_PALETTE[Math.floor(Math.random() * COLOR_PALETTE.length)];
  const LINE_STYLES = ['straight', 'zigzag', 'wavy'];
  const lineStyle = modeId === 'long' ? LINE_STYLES[Math.floor(Math.random() * LINE_STYLES.length)] : null;
  return { modeId, type, items, correct, question: m[qkey], shape, color, lineStyle };
}

function generateQuestions(modeId, type, count = 10) {
  const qs = [];
  for (let i = 0; i < count; i++) qs.push(generateQuestion(modeId, type));
  return qs;
}

/* ══ 상태 ══ */
let questions = [], currentQ = 0, score = 0, busy = false, delayTimer = null;
let currentModeId = '', currentType = '';
let firstAttemptWrong = false;
let ttsEnabled = true, impulsePrevention = true, impulseMode = 'lock', impulseDelay = 5;

/* ══ 설정 ══ */
function saveSettings() {
  localStorage.setItem('slowmath_comparing_settings', JSON.stringify({ ttsEnabled, impulsePrevention, impulseMode, impulseDelay }));
}
function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('slowmath_comparing_settings'));
    if (!s) return;
    if (typeof s.ttsEnabled === 'boolean') ttsEnabled = s.ttsEnabled;
    if (typeof s.impulsePrevention === 'boolean') impulsePrevention = s.impulsePrevention;
    if (s.impulseMode === 'lock') impulseMode = s.impulseMode;
    if (typeof s.impulseDelay === 'number' && s.impulseDelay >= 1 && s.impulseDelay <= 10) impulseDelay = s.impulseDelay;
  } catch(e) {}
}
function applySettingsUI() {
  document.getElementById('tts-toggle').classList.toggle('on', ttsEnabled);
  document.getElementById('impulse-toggle').classList.toggle('on', impulsePrevention);
  document.getElementById('impulse-details').style.display = impulsePrevention ? '' : 'none';
  document.querySelectorAll('.impulse-mode-btn').forEach(b => b.classList.toggle('selected', b.dataset.mode === impulseMode));
  document.getElementById('impulse-delay-row').style.display = impulseMode === 'lock' ? '' : 'none';
  document.querySelectorAll('.imp-sec').forEach((b, i) => b.classList.toggle('active', i + 1 === impulseDelay));
}
function toggleTTS() {
  ttsEnabled = !ttsEnabled;
  document.getElementById('tts-toggle').classList.toggle('on', ttsEnabled);
  if (!ttsEnabled && window.speechSynthesis) speechSynthesis.cancel();
  saveSettings();
}
function toggleImpulse() {
  impulsePrevention = !impulsePrevention;
  document.getElementById('impulse-toggle').classList.toggle('on', impulsePrevention);
  document.getElementById('impulse-details').style.display = impulsePrevention ? '' : 'none';
  saveSettings();
}
function setImpulseMode(mode) {
  impulseMode = mode;
  document.querySelectorAll('.impulse-mode-btn').forEach(b => b.classList.toggle('selected', b.dataset.mode === mode));
  document.getElementById('impulse-delay-row').style.display = mode === 'lock' ? '' : 'none';
  saveSettings();
}
function setImpulseDelay(sec) {
  impulseDelay = sec;
  document.querySelectorAll('.imp-sec').forEach((b, i) => b.classList.toggle('active', i + 1 === sec));
  saveSettings();
}

/* ══ TTS ══ */
function speak(text) {
  if (!ttsEnabled || !window.speechSynthesis) return;
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'ko-KR'; u.rate = 0.9;
  setTimeout(() => speechSynthesis.speak(u), 50);
}

/* ══ 뷰 전환 ══ */
const VIEWS = ['login-view','start-view','play-view','result-view'];
function showView(id) {
  VIEWS.forEach(v => {
    const el = document.getElementById(v);
    if (el) el.style.display = (v === id) ? 'flex' : 'none';
  });
  if (id !== 'login-view') {
    document.getElementById(id).classList.remove('hidden');
  }
}

/* ══ 로그인 ══ */
function socialLogin(provider) {
  localStorage.setItem('slowmath_comparing_login', JSON.stringify({ provider, time: Date.now() }));
  if (window.speechSynthesis) speechSynthesis.speak(new SpeechSynthesisUtterance(''));
  showView('start-view');
}
function logout() {
  localStorage.removeItem('slowmath_comparing_login');
  showView('login-view');
}
function goHome() {
  if (delayTimer) { clearInterval(delayTimer); delayTimer = null; }
  busy = false;
  showView('start-view');
}
function shareApp() {
  const url = window.location.href;
  if (navigator.share) {
    navigator.share({ title: document.title, url }).catch(() => {});
  } else {
    navigator.clipboard.writeText(url).then(() => alert('링크가 복사되었습니다!')).catch(() => prompt('링크를 복사하세요:', url));
  }
}

/* ══ 게임 시작 ══ */
function startGame(modeId, type) {
  if (!localStorage.getItem('slowmath_comparing_login')) { showView('login-view'); return; }
  currentModeId = modeId;
  currentType = type;
  questions = generateQuestions(modeId, type);
  currentQ = 0; score = 0;
  document.getElementById('play-score').textContent = '0점';
  showView('play-view');
  loadQuestion();
}

/* ══ 문제 로드 ══ */
function onNextQ() {
  document.getElementById('next-q-btn').classList.add('hidden');
  loadQuestion();
}

function loadQuestion() {
  document.getElementById('next-q-btn').classList.add('hidden');
  if (currentQ >= questions.length) { showResult(); return; }
  busy = false;
  firstAttemptWrong = false;

  const q = questions[currentQ];
  document.getElementById('q-label').textContent = (currentQ + 1) + ' / ' + questions.length;
  document.getElementById('progress-fill').style.width = (currentQ / questions.length * 100) + '%';
  document.getElementById('feedback').textContent = '';
  document.getElementById('feedback').className = 'feedback';
  document.getElementById('question-prompt').textContent = q.question;

  // Render items
  const compareRow = document.getElementById('compare-row');
  compareRow.innerHTML = '';
  q.items.forEach(item => {
    const card = document.createElement('div');
    card.className = 'item-card';
    card.dataset.label = item.label;
    card.innerHTML = `<div class="item-label">${item.label}</div><div class="item-visual">${drawItem(q.modeId, item.level, q.shape, q.color, q.lineStyle)}</div>`;
    card.onclick = () => pickAnswer(item.label, q.correct, q);
    compareRow.appendChild(card);
  });

  // Impulse area
  const impulseArea = document.getElementById('impulse-area');
  impulseArea.innerHTML = '';

  speak(q.question);

  if (impulsePrevention) {
    compareRow.querySelectorAll('.item-card').forEach(c => c.classList.add('card-locked'));
    let remaining = impulseDelay;
    const cd = document.createElement('div');
    cd.className = 'delay-countdown';
    cd.textContent = remaining;
    impulseArea.appendChild(cd);
    delayTimer = setInterval(() => {
      remaining--;
      if (remaining <= 0) {
        clearInterval(delayTimer); delayTimer = null;
        cd.remove();
        compareRow.querySelectorAll('.item-card').forEach(c => c.classList.remove('card-locked'));
      } else {
        cd.textContent = remaining;
      }
    }, 1000);
  }
}

/* ══ 답 선택 ══ */
function pickAnswer(picked, correct, q) {
  if (busy) return;
  if (delayTimer) { clearInterval(delayTimer); delayTimer = null; }
  document.getElementById('impulse-area').innerHTML = '';

  const fb = document.getElementById('feedback');

  if (picked === correct) {
    busy = true;
    document.querySelectorAll('#compare-row .item-card').forEach(c => {
      c.onclick = null;
      if (c.dataset.label === correct) c.classList.add('card-correct');
    });
    if (!firstAttemptWrong) {
      score++;
      document.getElementById('play-score').textContent = score + '점';
    }
    fb.textContent = '정답!';
    fb.className = 'feedback correct';
    speak('정답!');
    currentQ++;
    document.getElementById('next-q-btn').classList.remove('hidden');
  } else {
    firstAttemptWrong = true;
    const card = document.querySelector(`#compare-row .item-card[data-label="${picked}"]`);
    if (card) { card.classList.add('card-wrong'); card.onclick = null; }
    fb.textContent = '다시 골라보세요';
    fb.className = 'feedback wrong';
    speak('다시 골라보세요');
  }
}

/* ══ 결과 ══ */
function showResult() {
  showView('result-view');
  document.getElementById('final-score').textContent = score;
  document.getElementById('result-detail').textContent = questions.length + '문제 중 ' + score + '문제 정답';
  speak(score + '개 맞았어요!');
}

/* ══ 초기화 ══ */
(function init() {
  loadSettings();
  applySettingsUI();
  if (localStorage.getItem('slowmath_comparing_login')) {
    showView('start-view');
  } else {
    showView('login-view');
  }
  if (window.speechSynthesis) {
    speechSynthesis.getVoices();
    if (speechSynthesis.onvoiceschanged !== undefined)
      speechSynthesis.onvoiceschanged = () => speechSynthesis.getVoices();
  }
})();

setTimeout(function() {
  const splash = document.getElementById('splash');
  if (splash) { splash.classList.add('fade-out'); setTimeout(() => splash.remove(), 500); }
}, 3000);
</script>
